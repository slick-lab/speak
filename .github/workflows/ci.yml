name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1

    - name: Install dependencies
      run: shards install

    - name: Check formatting
      run: crystal tool format --check

    - name: Compile check
      run: crystal build src/speak.cr --release

    - name: Run tests
      run: crystal spec spec/test.cr --parallel
      env:
        CI: true

  lines-of-code:
    name: Count Lines of Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install tokei
      run: |
        sudo apt-get update
        sudo apt-get install -y cargo
        cargo install tokei --quiet || true
        # Fallback: use wc if tokei fails
        if ! command -v tokei &> /dev/null; then
          echo "tokei not available, using wc fallback"
          TOTAL_LINES=$(find src -name "*.cr" -exec cat {} \; | wc -l)
          echo "TOTAL_LINES=$TOTAL_LINES" >> $GITHUB_ENV
          echo "CRYSTAL_LINES=$TOTAL_LINES" >> $GITHUB_ENV
        fi

    - name: Count lines with tokei
      if: success()
      run: |
        tokei --output json > loc.json
        
        TOTAL_LINES=$(jq '.Total.code' loc.json)
        CRYSTAL_LINES=$(jq '.Crystal.code' loc.json)
        MARKDOWN_LINES=$(jq '.Markdown.code' loc.json)
        YAML_LINES=$(jq '.YAML.code' loc.json)
        
        echo "TOTAL_LINES=$TOTAL_LINES" >> $GITHUB_ENV
        echo "CRYSTAL_LINES=$CRYSTAL_LINES" >> $GITHUB_ENV
        
        echo "========================================="
        echo "Lines of Code Summary"
        echo "========================================="
        echo "Total lines:     $TOTAL_LINES"
        echo "Crystal lines:   $CRYSTAL_LINES"
        echo "Markdown lines:  $MARKDOWN_LINES"
        echo "YAML lines:      $YAML_LINES"
        echo "========================================="
        
        tokei > loc_summary.txt

    - name: Generate LOC badge
      run: |
        TOTAL_LINES=${TOTAL_LINES:-$(find src -name "*.cr" -exec cat {} \; | wc -l)}
        mkdir -p .badges
        echo "{\"schemaVersion\":1,\"label\":\"Lines of Code\",\"message\":\"$TOTAL_LINES\",\"color\":\"blue\"}" > .badges/loc.json

    - name: Upload LOC report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: lines-of-code-report
        path: |
          loc.json
          loc_summary.txt
          .badges/loc.json

  metrics:
    name: Track Metrics
    runs-on: ubuntu-latest
    needs: [test, lines-of-code]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download LOC report
      uses: actions/download-artifact@v4
      with:
        name: lines-of-code-report

    - name: Generate metrics report
      run: |
        if [ -f loc.json ]; then
          TOTAL_LINES=$(jq '.Total.code' loc.json)
          CRYSTAL_LINES=$(jq '.Crystal.code' loc.json)
        else
          TOTAL_LINES=$(find src -name "*.cr" -exec cat {} \; | wc -l)
          CRYSTAL_LINES=$TOTAL_LINES
        fi
        TEST_COUNT=$(grep -c "it \"" spec/test.cr 2>/dev/null || echo "0")
        
        echo "## Metrics Report" > metrics.md
        echo "" >> metrics.md
        echo "| Metric | Value |" >> metrics.md
        echo "|--------|-------|" >> metrics.md
        echo "| Date | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> metrics.md
        echo "| Total Lines of Code | $TOTAL_LINES |" >> metrics.md
        echo "| Crystal Code Lines | $CRYSTAL_LINES |" >> metrics.md
        echo "| Test Count | $TEST_COUNT |" >> metrics.md
        
        cat metrics.md

    - name: Upload metrics report
      uses: actions/upload-artifact@v4
      with:
        name: metrics-report
        path: metrics.md

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1

    - name: Install dependencies
      run: shards install

    - name: Run coverage
      run: |
        crystal spec --verbose --coverage
        echo "Coverage results in .crystal/coverage/"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: .crystal/coverage/

  track-metrics:
    name: Track Metrics History
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Count current LOC
      run: |
        sudo apt-get install -y cargo || true
        cargo install tokei --quiet || true
        if command -v tokei &> /dev/null; then
          tokei --output json > loc_current.json
          TOTAL=$(jq '.Total.code' loc_current.json)
        else
          TOTAL=$(find src -name "*.cr" -exec cat {} \; | wc -l)
        fi
        DATE=$(date +%Y-%m-%d)
        echo "$DATE,$TOTAL" >> loc_history.csv

    - name: Upload history
      uses: actions/upload-artifact@v4
      with:
        name: loc-history
        path: loc_history.csv

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [test, lines-of-code, metrics]
    if: success()
    
    steps:
    - name: All checks passed
      run: echo "All CI checks passed successfully"
