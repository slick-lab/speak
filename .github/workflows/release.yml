name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1

    - name: Install dependencies
      run: shards install

    - name: Build Linux binary
      run: crystal build src/speak.cr --release -o speak-linux

    - name: Build macOS binary
      run: crystal build src/speak.cr --release --cross-compile --target x86_64-apple-darwin -o speak-mac

    - name: Setup Node for changelog
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Create release with changelog and contributors
      run: npx changelogithub@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload binaries to release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        files: |
          speak-linux-x86_64
          speak-macos-x86_64
